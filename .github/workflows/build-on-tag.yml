name: Build video on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-video-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Remotion video
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install edge-tts

      - name: Generate voiceover
        run: npm run voiceover

      - name: Typecheck
        run: npm run typecheck

      - name: Render video
        run: npm run render

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-${{ github.ref_name }}
          path: out/solar-system.mp4
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/solar-system.mp4
